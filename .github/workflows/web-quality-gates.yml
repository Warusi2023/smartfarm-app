# Web-only quality gates: Vite build, dist artifact present, Playwright.
# Optional: production Railway /api/health + CORS sample on main branch pushes.
# Does not replace frontend-ci-cd.yml or ci.yml — additive checks on web-project changes.

name: Web quality gates

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "web-project/**"
      - ".github/workflows/web-quality-gates.yml"
  push:
    branches: [main, develop]
    paths:
      - "web-project/**"
      - ".github/workflows/web-quality-gates.yml"

env:
  NODE_VERSION: "18"
  # Origin-only — matches web-project/.env.example
  VITE_API_URL: https://test-api.example.com
  VITE_API_BASE_URL: https://test-api.example.com

jobs:
  web-gates:
    name: Web build + Playwright + dist check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build (Vite)
        run: npm run build
        env:
          CI: true

      - name: Assert dist entry exists
        run: test -f dist/index.html

      # Playwright uses webServer: serve public/ (see web-project/playwright.config.js) — not dist.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test

  # Optional: production Railway health only (CORS belongs in WEB_PRODUCTION_VERIFICATION.md in-browser).
  smoke-production-api:
    name: Smoke — production GET /api/health
    runs-on: ubuntu-latest
    needs: web-gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: GET /api/health (expect 200)
        run: |
          code=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://web-production-86d39.up.railway.app/api/health)
          echo "HTTP $code"
          test "$code" = "200"
          head -c 200 /tmp/health.json || true
