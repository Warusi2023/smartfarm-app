name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd web-project && npm ci
        cd ../railway-minimal && npm ci
    
    - name: Build web application
      run: |
        cd web-project
        npm run build

    - name: Verify Android release secrets
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        missing=0
        for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD GOOGLE_SERVICES_JSON; do
          if [ -z "${!name}" ]; then
            echo "::error::Missing GitHub secret: $name"
            missing=1
          fi
        done
        exit $missing

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
        yes | sdkmanager --licenses || true

    - name: Provision Android signing keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android-project/app/release.keystore

    - name: Provision google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        printf '%s' "$GOOGLE_SERVICES_JSON" > android-project/app/google-services.json

    - name: Build Android release artifacts
      env:
        ANDROID_KEYSTORE_PATH: release.keystore
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        cd android-project
        chmod +x ./gradlew
        ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## 🚀 SmartFarm Release ${{ github.ref }}
          
          ### 📦 Downloads
          - **Web Application**: Built and ready for deployment
          - **Android APK**: Available in release assets
          - **Android AAB**: Available in release assets (Play Store upload)
          
          ### 🔧 Installation
          1. Download the appropriate package for your platform
          2. Follow the installation instructions in the documentation
          3. Configure your environment variables
          
          ### 📚 Documentation
          - [Installation Guide](docs/INSTALLATION.md)
          - [User Manual](docs/USER_MANUAL.md)
          - [API Documentation](docs/API.md)
          
          ### 🐛 Bug Reports
          If you encounter any issues, please report them on our [Issues Page](https://github.com/Warusi2023/smartfarm-app/issues).
        draft: false
        prerelease: false
    
    - name: Upload Web Build
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./web-project/dist/
        asset_name: smartfarm-web-${{ github.ref_name }}.zip
        asset_content_type: application/zip
    
    - name: Upload Android APK
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./android-project/app/build/outputs/apk/release/app-release.apk
        asset_name: smartfarm-android-${{ github.ref_name }}.apk
        asset_content_type: application/vnd.android.package-archive

    - name: Upload Android AAB
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./android-project/app/build/outputs/bundle/release/app-release.aab
        asset_name: smartfarm-android-${{ github.ref_name }}.aab
        asset_content_type: application/octet-stream
