<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Traceability - SmartFarm</title>
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .wrap { max-width: 720px; margin: 48px auto; padding: 0 16px; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Product traceability</h1>
                <p class="text-muted" id="productLine">Loading product reference…</p>
                <p class="mb-4">Full traceability records are managed from your farm dashboard and Farm-to-Table workflow. This public page confirms the product reference encoded in the QR or share link.</p>
                <div class="d-flex flex-wrap gap-2">
                    <a href="dashboard.html" class="btn btn-success">Open dashboard</a>
                    <a href="farm-to-table.html" class="btn btn-outline-secondary">Farm-to-Table</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id') || params.get('product') || '';
        const el = document.getElementById('productLine');
        if (productId) {
            el.textContent = 'Reference: ' + productId;
        } else {
            el.textContent = 'No product reference was provided in this link.';
        }
    </script>
</body>
</html>
