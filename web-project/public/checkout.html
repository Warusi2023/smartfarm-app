<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Farm Pro - SmartFarm</title>
    <meta name="robots" content="noindex,nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .checkout-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 520px;
            width: 100%;
            padding: 2.5rem;
            text-align: center;
        }
    </style>
    <script src="js/api-url-fix.js"></script>
    <script src="js/api-origin.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/subscription-billing.js"></script>
</head>
<body>
    <div class="checkout-card">
        <h1 class="h4 mb-3"><i class="fas fa-lock text-success me-2"></i>Farm Pro checkout</h1>
        <p class="text-muted" id="checkoutStatus">Preparing secure Stripe checkout…</p>
        <div class="spinner-border text-success mt-3" role="status" aria-hidden="true"></div>
        <div id="checkoutRetry" class="d-none mt-4">
            <a href="subscription-management.html" class="btn btn-primary">Go to billing</a>
            <a href="login.html" class="btn btn-link">Log in</a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (window.SmartFarmBilling) {
                window.SmartFarmBilling.initCheckoutPage();
            }
        });
    </script>
</body>
</html>
