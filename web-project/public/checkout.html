<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans &amp; Billing - SmartFarm</title>
    <meta name="robots" content="noindex,nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c5530;
            --secondary-color: #4a7c59;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .checkout-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 560px;
            width: 100%;
            padding: 2.5rem;
            text-align: center;
        }
    </style>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var plan = (params.get('plan') || 'trial').toLowerCase();
            if (plan === 'trial') {
                window.location.replace('register.html?plan=trial');
                return;
            }
            window.location.replace('contact.html?plan=' + encodeURIComponent(plan));
        })();
    </script>
</head>
<body>
    <div class="checkout-card">
        <h1 class="h3 mb-3"><i class="fas fa-info-circle text-primary me-2"></i>Online billing not available yet</h1>
        <p class="text-muted mb-4">Paid subscriptions are handled by our team. Start with a free account, or contact us for Professional and Enterprise plans.</p>
        <div class="d-grid gap-2">
            <a href="register.html" class="btn btn-success btn-lg"><i class="fas fa-user-plus me-2"></i>Start free — Create account</a>
            <a href="contact.html" class="btn btn-outline-primary btn-lg"><i class="fas fa-envelope me-2"></i>Contact us for paid plans</a>
            <a href="pricing.html" class="btn btn-link">View pricing</a>
        </div>
    </div>
</body>
</html>
