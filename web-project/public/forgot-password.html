<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SmartFarm</title>
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #8BC34A, #4CAF50, #2E7D32);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-box {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            padding: 32px;
            max-width: 440px;
            width: 92%;
        }
    </style>
</head>
<body>
    <div class="card-box">
        <h1 class="h3 mb-2"><i class="fas fa-key text-success me-2"></i>Reset password</h1>
        <p class="text-muted mb-4">Enter your account email and we will send a reset link if the account exists.</p>
        <form id="forgotForm">
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" required autocomplete="email">
            </div>
            <button type="submit" class="btn btn-success w-100" id="submitBtn">Send reset link</button>
        </form>
        <div id="status" class="alert mt-3 d-none" role="alert"></div>
        <p class="small text-muted mt-3 mb-0"><a href="login.html">Back to login</a></p>
    </div>
    <script src="js/api-origin.js"></script>
    <script src="js/api-url-fix.js?v=sfm20260510"></script>
    <script src="js/api-config.js"></script>
    <script>
        function apiUrl(path) {
            if (window.SmartFarmApiConfig && typeof window.SmartFarmApiConfig.url === 'function') {
                return window.SmartFarmApiConfig.url(path);
            }
            if (window.__SMARTFARM_RESOLVE_API_ORIGIN__) {
                const origin = window.__SMARTFARM_RESOLVE_API_ORIGIN__();
                return origin + '/api/' + String(path).replace(/^\//, '');
            }
            return 'https://web-production-86d39.up.railway.app/api/' + String(path).replace(/^\//, '');
        }

        const form = document.getElementById('forgotForm');
        const statusEl = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return;
            submitBtn.disabled = true;
            statusEl.className = 'alert mt-3 alert-info';
            statusEl.textContent = 'Sending…';
            statusEl.classList.remove('d-none');
            try {
                const res = await fetch(apiUrl('/auth/forgot-password'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.success !== false) {
                    statusEl.className = 'alert mt-3 alert-success';
                    statusEl.textContent = data.message || 'If an account exists for that email, a reset link has been sent.';
                    form.reset();
                } else {
                    statusEl.className = 'alert mt-3 alert-danger';
                    statusEl.textContent = data.error || 'Could not send reset email. Try again later.';
                }
            } catch (err) {
                statusEl.className = 'alert mt-3 alert-danger';
                statusEl.textContent = 'Network error. Check your connection and try again.';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
