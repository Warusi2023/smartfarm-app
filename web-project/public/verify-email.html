<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - SmartFarm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #28a745, #20c997);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .verification-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        
        .logo {
            color: #28a745;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .title {
            color: #333;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }
        
        .success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border: 2px solid #28a745;
        }
        
        .error {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            border: 2px solid #dc3545;
        }
        
        .loading {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border: 2px solid #ffc107;
        }
        
        .status-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .status-icon.success {
            color: #28a745;
        }
        
        .status-icon.error {
            color: #dc3545;
        }
        
        .status-icon.loading {
            color: #ffc107;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: bold;
            margin: 10px;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #218838, #1ea085);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        
        .resend-section {
            background: #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .email-input {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            margin: 10px 0;
        }
        
        .email-input:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }
    </style>
</head>
<body>
    <div class="verification-container">
        <div class="logo">
            <i class="fas fa-seedling"></i>
        </div>
        
        <h1 class="title">Email Verification</h1>
        <p class="subtitle">SmartFarm Account Verification</p>
        
        <div id="status-card" class="status-card loading">
            <div class="status-icon loading">
                <i class="fas fa-spinner"></i>
            </div>
            <h3 id="status-title">Verifying Your Email...</h3>
            <p id="status-message">Please wait while we verify your email address.</p>
            <div id="status-details"></div>
        </div>
        
        <div id="action-buttons" style="display: none;">
            <button id="login-btn" class="btn btn-primary" onclick="goToLogin()" style="display: none;">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </button>
            
            <button id="register-btn" class="btn btn-primary" onclick="goToRegister()" style="display: none;">
                <i class="fas fa-user-plus"></i> Register New Account
            </button>
        </div>
        
        <div id="resend-section" class="resend-section" style="display: none;">
            <h5>Didn't receive the email?</h5>
            <p>Enter your email address and we'll send you a new verification link.</p>
            <input type="email" id="resend-email" class="form-control email-input" placeholder="Enter your email address">
            <button id="resend-btn" class="btn btn-primary" onclick="resendVerification()">
                <i class="fas fa-paper-plane"></i> Resend Verification Email
            </button>
        </div>
    </div>

    <script src="js/api-origin.js"></script>
    <script src="js/api-config.js"></script>
    <script>
        function apiUrl(path) {
            return window.SmartFarmApiConfig
                ? window.SmartFarmApiConfig.url(path)
                : 'https://web-production-86d39.up.railway.app/api/' + path.replace(/^\//, '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = (urlParams.get('token') || '').trim();

        const statusCard = document.getElementById('status-card');
        const actionButtons = document.getElementById('action-buttons');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const resendSection = document.getElementById('resend-section');
        const resendEmail = document.getElementById('resend-email');
        const resendBtn = document.getElementById('resend-btn');

        let verifyRequestStarted = false;

        if (token) {
            runVerification(token);
        } else {
            showFailureState(
                'missing_token',
                'Invalid verification link',
                'No verification token was found in this link. Open the link from your email or request a new verification email below.'
            );
        }

        async function runVerification(token) {
            if (verifyRequestStarted) {
                return;
            }
            verifyRequestStarted = true;

            let data;
            try {
                const response = await fetch(apiUrl('auth/verify-email/' + encodeURIComponent(token)), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                try {
                    data = await response.json();
                } catch (parseError) {
                    showFailureState(
                        'unexpected_response',
                        'Could not verify your email',
                        'The server returned an unexpected response. Please try again or request a new verification email.'
                    );
                    return;
                }

                const status = data.status || inferStatusFromLegacy(data, response.ok);
                if (status === 'verified' || status === 'already_verified') {
                    showSuccessState(status, data.message, data.data);
                    return;
                }
                if (
                    status === 'expired' ||
                    status === 'invalid_token' ||
                    status === 'missing_token' ||
                    status === 'network_error' ||
                    status === 'unexpected_response' ||
                    status === 'server_error'
                ) {
                    showFailureState(
                        status,
                        data.error || defaultFailureTitle(status),
                        data.message || defaultFailureMessage(status)
                    );
                    return;
                }
                if (data.success) {
                    showSuccessState('verified', data.message, data.data);
                    return;
                }

                showFailureState(
                    'invalid_token',
                    data.error || 'Could not verify your email',
                    data.message || defaultFailureMessage('invalid_token')
                );
            } catch (error) {
                console.error('Verification error:', error);
                showFailureState(
                    'network_error',
                    'Network error',
                    'We could not reach the server to verify your email. Check your connection and try opening the link again.'
                );
            }
        }

        function inferStatusFromLegacy(data, responseOk) {
            if (data.status) {
                return data.status;
            }
            if (data.success && responseOk) {
                return 'verified';
            }
            const code = (data.code || '').toUpperCase();
            if (code === 'TOKEN_EXPIRED') {
                return 'expired';
            }
            if (code === 'VERIFICATION_ERROR') {
                return 'server_error';
            }
            if (code === 'MISSING_TOKEN') {
                return 'missing_token';
            }
            if (code === 'INVALID_TOKEN') {
                return 'invalid_token';
            }
            return data.success ? 'verified' : 'invalid_token';
        }

        function defaultFailureTitle(status) {
            switch (status) {
                case 'expired':
                    return 'Verification link expired';
                case 'missing_token':
                    return 'Invalid verification link';
                case 'network_error':
                    return 'Network error';
                case 'unexpected_response':
                    return 'Could not verify your email';
                case 'server_error':
                    return 'Verification temporarily unavailable';
                default:
                    return 'Invalid verification link';
            }
        }

        function defaultFailureMessage(status) {
            switch (status) {
                case 'expired':
                    return 'This verification link has expired. Enter your email below to receive a new one.';
                case 'missing_token':
                    return 'No verification token was found in this link. Open the link from your email or request a new verification email below.';
                case 'network_error':
                    return 'We could not reach the server to verify your email. Check your connection and try opening the link again.';
                case 'unexpected_response':
                    return 'The server returned an unexpected response. Please try again or request a new verification email.';
                case 'server_error':
                    return 'Something went wrong while verifying your email. Please try again shortly or request a new verification email.';
                default:
                    return 'This verification link is invalid. Enter your email below to request a new one, or sign in if you already verified.';
            }
        }

        function showSuccessState(status, message, userData) {
            const isAlready = status === 'already_verified';
            const title = isAlready ? 'Email Already Verified' : 'Email Verified Successfully!';
            const email = userData && userData.email ? userData.email : null;
            const emailBlock = email
                ? `<p class="mb-0"><strong>Email:</strong> ${escapeHtml(email)}</p>`
                : '';

            statusCard.className = 'status-card success';
            statusCard.innerHTML = `
                <div class="status-icon success">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h3>${escapeHtml(title)}</h3>
                <p>${escapeHtml(message || (isAlready
                    ? 'Your email is already verified. You can sign in now.'
                    : 'Your account is verified. You can sign in now.'))}</p>
                ${emailBlock ? `<div class="mt-3">${emailBlock}</div>` : ''}
            `;

            actionButtons.style.display = 'block';
            loginBtn.style.display = 'inline-block';
            registerBtn.style.display = 'none';
            resendSection.style.display = 'none';
        }

        function shouldShowResend(status) {
            return (
                status === 'expired' ||
                status === 'invalid_token' ||
                status === 'missing_token' ||
                status === 'network_error' ||
                status === 'unexpected_response' ||
                status === 'server_error'
            );
        }

        function shouldShowRegister(status) {
            return status === 'expired' || status === 'invalid_token' || status === 'missing_token';
        }

        function showFailureState(status, title, message) {
            const showResend = shouldShowResend(status);
            const showRegister = shouldShowRegister(status);

            statusCard.className = 'status-card error';
            statusCard.innerHTML = `
                <div class="status-icon error">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h3>${escapeHtml(title)}</h3>
                <p>${escapeHtml(message)}</p>
            `;

            actionButtons.style.display = 'block';
            loginBtn.style.display = 'inline-block';
            registerBtn.style.display = showRegister ? 'inline-block' : 'none';
            resendSection.style.display = showResend ? 'block' : 'none';
        }

        async function resendVerification() {
            const email = resendEmail.value.trim();
            
            if (!email) {
                alert('Please enter your email address');
                return;
            }
            
            if (!isValidEmail(email)) {
                alert('Please enter a valid email address');
                return;
            }
            
            resendBtn.disabled = true;
            resendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            
            try {
                const response = await fetch(apiUrl('auth/resend-verification'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(data.message || 'Verification email sent successfully! Please check your inbox.');
                    resendEmail.value = '';
                } else {
                    alert(data.error || data.message || 'Failed to send verification email');
                }
                
            } catch (error) {
                console.error('Resend error:', error);
                alert('Failed to send verification email. Please try again.');
            } finally {
                resendBtn.disabled = false;
                resendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Resend Verification Email';
            }
        }
        
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        function goToRegister() {
            window.location.href = 'register.html';
        }
        
        // Handle Enter key in email input
        resendEmail.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                resendVerification();
            }
        });
    </script>
</body>
</html>
