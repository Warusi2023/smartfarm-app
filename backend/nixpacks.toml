# Backend production entrypoint: server.js (see package.json "start").
# server-simple.cjs is demo/static-only — not for production API deploys.
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --only=production"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"

